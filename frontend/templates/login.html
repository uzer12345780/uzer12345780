{% extends "layout.html" %}

{% block title %}Вхід - KoloCloud{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">
                <i class="fas fa-cloud"></i> KoloCloud
            </h1>
            <p class="text-gray-600">Хмарне сховище для військових цілей</p>
        </div>
        
        <div id="alert" class="hidden mb-4 p-3 rounded"></div>
        
        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 mb-2">
                    <i class="fas fa-user"></i> Ім'я користувача
                </label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Введіть ім'я користувача">
            </div>
            
            <div>
                <label class="block text-gray-700 mb-2">
                    <i class="fas fa-lock"></i> Пароль
                </label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Введіть пароль">
            </div>
            
            <div class="flex items-center">
                <input type="checkbox" id="remember" name="remember" class="mr-2">
                <label for="remember" class="text-gray-700">Запам'ятати мене</label>
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-sign-in-alt"></i> Увійти
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <button onclick="showRegisterForm()" class="text-blue-600 hover:underline">
                <i class="fas fa-user-plus"></i> Немає облікового запису? Зареєструватися
            </button>
        </div>
        
        <!-- Register Form (hidden by default) -->
        <form id="registerForm" class="hidden space-y-4 mt-6">
            <h2 class="text-2xl font-bold text-center mb-4">Реєстрація</h2>
            
            <div>
                <label class="block text-gray-700 mb-2">Ім'я користувача</label>
                <input type="text" id="reg_username" name="username" required
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 mb-2">Email</label>
                <input type="email" id="reg_email" name="email" required
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 mb-2">Повне ім'я</label>
                <input type="text" id="reg_fullname" name="full_name"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 mb-2">Пароль</label>
                <input type="password" id="reg_password" name="password" required
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <button type="submit" 
                    class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                <i class="fas fa-user-plus"></i> Зареєструватися
            </button>
            
            <button type="button" onclick="showLoginForm()"
                    class="w-full bg-gray-500 text-white py-2 rounded-lg hover:bg-gray-600 transition">
                Повернутися до входу
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Handle login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password, remember})
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showAlert('Вхід успішний!', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                showAlert(data.error || 'Помилка входу', 'error');
            }
        } catch (error) {
            showAlert('Помилка з\'єднання', 'error');
        }
    });
    
    // Handle registration
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('reg_username').value;
        const email = document.getElementById('reg_email').value;
        const full_name = document.getElementById('reg_fullname').value;
        const password = document.getElementById('reg_password').value;
        
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, email, full_name, password})
            });
            
            const data = await response.json();
            
            if (response.ok) {
                showAlert('Реєстрація успішна! Тепер увійдіть.', 'success');
                setTimeout(() => showLoginForm(), 2000);
            } else {
                showAlert(data.error || 'Помилка реєстрації', 'error');
            }
        } catch (error) {
            showAlert('Помилка з\'єднання', 'error');
        }
    });
    
    function showRegisterForm() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    }
    
    function showLoginForm() {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    }
    
    function showAlert(message, type) {
        const alert = document.getElementById('alert');
        alert.className = `mb-4 p-3 rounded ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
        alert.textContent = message;
        alert.classList.remove('hidden');
    }
</script>
{% endblock %}
